<!DOCTYPE html>
<html lang="fr" data-theme="dark">

<meta name="theme-color" content="#0F0E1A" />
<script>
  /* Apply saved theme synchronously to avoid flash */
  try{
    var s = JSON.parse(localStorage.getItem('godsmedicine_v1') || '{}');
    var t = (s && s.theme === 'light') ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', t);
  }catch(e){}
</script>
<meta name="description" content="God's Medicine — Ordonnance divine de guérison en 14 jours" />
<meta name="apple-mobile-web-app-capable" content="yes" />

<style>
/* ============================================================
   GOD'S MEDICINE — Design System
   ============================================================ */
:root{
  /* === DARK THEME (default) === */
  --bg-deep:#0F0E1A;
  --bg-card:#1C1B2E;
  --bg-card-2:#242338;
  --bg-input:#2A2940;
  --border-c:rgba(255,255,255,0.08);
  --border-c2:rgba(255,255,255,0.15);

  --ink:#E8E5DD;
  --ink-soft:#9A97A0;
  --verse-gray:#C0BDB5;
  --key-color:#F0C050;

  /* Brand palette — stable across themes (used as backgrounds) */
  --navy:#0D2340;
  --navy-soft:#1A3358;
  --gold:#C49A2A;
  --gold-light:#E8C96A;
  --cream:#F7F3EC;             /* light foreground used on navy/gold buttons */

  /* Theme-dependent accents */
  --gold-dark:#F0C050;          /* in dark = bright gold (labels) */
  --teal:#2DD4A0;
  --coral:#F08060;
  --morning:#F0A830;
  --noon:#E8C96A;
  --evening:#7B9FF0;

  /* Emphasis text color (was --navy; now theme-aware) */
  --brand-fg:#E8C96A;

  /* Surface aliases — old names map to themed surfaces */
  --cream-2:var(--bg-card);
  --parchment:var(--bg-card-2);
  --parchment-2:var(--border-c2);

  /* Honey tints used in highlight backgrounds (selected option, confession) */
  --honey-1:#3a2f15;
  --honey-2:#2a2410;
  --honey-border:rgba(240,192,80,.32);

  --shadow-sm:0 2px 8px rgba(0,0,0,.45);
  --shadow-md:0 6px 24px rgba(0,0,0,.55);
  --shadow-lg:0 16px 48px rgba(0,0,0,.7);

  --r-sm:8px; --r-md:14px; --r-lg:22px;
  --tx:cubic-bezier(.22,.61,.36,1);
}
[data-theme="light"]{
  --bg-deep:#F7F3EC;
  --bg-card:#FFFFFF;
  --bg-card-2:#FBF8F2;
  --bg-input:#EDE4D3;
  --border-c:rgba(0,0,0,0.08);
  --border-c2:rgba(0,0,0,0.15);

  --ink:#1A1208;
  --ink-soft:#5A4E3C;
  --verse-gray:#6B6050;
  --key-color:#0D2340;

  --gold-dark:#7B5D10;
  --teal:#0F5C47;
  --coral:#8B3A2A;
  --morning:#E8A020;
  --noon:#C49A2A;
  --evening:#2A4A8B;

  --brand-fg:#0D2340;

  --cream-2:#FBF8F2;
  --parchment:#EDE4D3;
  --parchment-2:#E2D6BD;

  --honey-1:#fbf3df;
  --honey-2:#f4e7c4;
  --honey-border:rgba(196,154,42,.35);

  --shadow-sm:0 2px 8px rgba(13,35,64,.08);
  --shadow-md:0 6px 24px rgba(13,35,64,.12);
  --shadow-lg:0 16px 48px rgba(13,35,64,.18);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{font-size:16px;}
html,body{height:100%;}
body{
  font-family:'Lato',-apple-system,BlinkMacSystemFont,sans-serif;
  font-weight:400;
  color:var(--ink);
  background:var(--bg-deep);
  background-image:
    radial-gradient(1200px 600px at 80% -10%, rgba(232,201,106,.05), transparent 60%),
    radial-gradient(900px 500px at -10% 110%, rgba(13,35,64,.18), transparent 60%);
  background-attachment:fixed;
  line-height:1.6;
  -webkit-font-smoothing:antialiased;
  overscroll-behavior-y:contain;
  transition:background .3s ease, color .3s ease;
}
body::before{display:none;}
[data-theme="light"] body{
  background-image:
    radial-gradient(1200px 600px at 80% -10%, rgba(196,154,42,.06), transparent 60%),
    radial-gradient(900px 500px at -10% 110%, rgba(13,35,64,.05), transparent 60%);
}
[data-theme="light"] body::before{
  display:block;
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.35;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.55  0 0 0 0 0.45  0 0 0 0 0.30  0 0 0 0.06 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
}
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-thumb{background:rgba(13,35,64,.18);border-radius:6px;}

/* Typography */
h1,h2,h3,h4,.serif{font-family:'Cormorant Garamond',Georgia,serif;letter-spacing:.005em;}
.verse{font-family:'Cormorant Garamond',Georgia,serif;font-style:italic;}
.key{color:var(--key-color);font-weight:700;font-style:normal;}

/* Layout */
.app{
  position:relative;z-index:1;
  max-width:520px;margin:0 auto;min-height:100vh;min-height:100dvh;
  padding:0 0 96px 0;
  display:flex;flex-direction:column;
}
.screen{display:none;flex:1;padding:24px 20px 32px;animation:fadeUp .35s var(--tx) both;}
.screen.active{display:block;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
.stagger > *{animation:fadeUp .45s var(--tx) both;}
.stagger > *:nth-child(1){animation-delay:.05s;}
.stagger > *:nth-child(2){animation-delay:.13s;}
.stagger > *:nth-child(3){animation-delay:.21s;}
.stagger > *:nth-child(4){animation-delay:.29s;}
.stagger > *:nth-child(5){animation-delay:.37s;}
.stagger > *:nth-child(6){animation-delay:.45s;}

/* Header bar */
.topbar{
  display:flex;align-items:center;gap:12px;
  padding:14px 4px 18px;
}
.topbar .back{
  display:inline-flex;align-items:center;justify-content:center;
  width:38px;height:38px;border-radius:50%;
  background:var(--cream-2);border:1px solid var(--parchment-2);
  color:var(--brand-fg);cursor:pointer;font-size:18px;
}
.topbar .title{
  font-family:'Cormorant Garamond',serif;font-weight:600;font-size:1.15rem;color:var(--brand-fg);
  letter-spacing:.02em;
}
.topbar .spacer{flex:1;}

/* Buttons */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  font-family:'Lato',sans-serif;font-weight:700;letter-spacing:.04em;
  padding:14px 22px;border-radius:var(--r-md);border:none;cursor:pointer;
  transition:transform .2s var(--tx), box-shadow .2s var(--tx), background .2s;
  font-size:.92rem;text-transform:uppercase;
}
.btn:active{transform:scale(.97);}
.btn-primary{
  background:linear-gradient(180deg,var(--navy-soft),var(--navy));
  color:var(--cream);box-shadow:var(--shadow-md);
}
.btn-primary:hover{box-shadow:var(--shadow-lg);}
.btn-gold{
  background:linear-gradient(180deg,var(--gold-light),var(--gold));
  color:#0D2340;box-shadow:0 6px 16px rgba(196,154,42,.35);
}
.btn-ghost{
  background:transparent;color:var(--brand-fg);
  border:1px solid var(--parchment-2);
}
.btn-block{display:flex;width:100%;}
.btn-sm{padding:9px 14px;font-size:.78rem;}

/* Card */
.card{
  background:var(--cream-2);
  border:1px solid var(--parchment-2);
  border-radius:var(--r-lg);
  padding:22px 20px;
  box-shadow:var(--shadow-sm);
  position:relative;
}
.card.parchment{
  background:linear-gradient(180deg,var(--cream-2),var(--parchment));
}
.card-pad-lg{padding:28px 22px;}
.divider{
  height:1px;background:linear-gradient(90deg,transparent,var(--parchment-2),transparent);
  margin:18px 0;
}
.gold-line{
  height:2px;width:60px;
  background:linear-gradient(90deg,var(--gold-light),var(--gold-dark));
  border-radius:2px;margin:8px 0 14px;
}

/* Pill */
.pill{
  display:inline-flex;align-items:center;gap:6px;
  padding:5px 12px;border-radius:999px;
  font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;
  background:var(--parchment);color:var(--brand-fg);
  border:1px solid var(--parchment-2);
}
.pill.gold{background:rgba(196,154,42,.14);color:var(--gold-dark);border-color:rgba(196,154,42,.3);}
.pill.teal{background:rgba(15,92,71,.1);color:var(--teal);border-color:rgba(15,92,71,.25);}
.pill.morning{background:rgba(232,160,32,.14);color:var(--morning);border-color:rgba(232,160,32,.3);}
.pill.noon{background:rgba(196,154,42,.14);color:var(--gold-dark);border-color:rgba(196,154,42,.3);}
.pill.evening{background:rgba(42,74,139,.12);color:var(--evening);border-color:rgba(42,74,139,.3);}

/* ===== Module 1 — Home ===== */
.splash{
  text-align:center;padding:36px 12px 20px;
}
.logo-orb{
  width:122px;height:122px;margin:8px auto 22px;
  border-radius:50%;
  background:radial-gradient(circle at 30% 25%, #1B3866 0%, var(--navy) 65%);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 18px 50px -12px rgba(13,35,64,.5), inset 0 0 0 2px rgba(196,154,42,.55);
  position:relative;
}
.logo-orb::after{
  content:'';position:absolute;inset:6px;border-radius:50%;
  border:1px dashed rgba(232,201,106,.35);
}
.logo-pill{
  width:74px;height:34px;border-radius:999px;
  background:linear-gradient(180deg,var(--gold-light),var(--gold));
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 14px rgba(0,0,0,.25), inset 0 -2px 0 rgba(0,0,0,.1);
  position:relative;z-index:2;
}
.logo-pill::before,.logo-pill::after{
  content:'';position:absolute;background:var(--cream);border-radius:1px;
}
.logo-pill::before{width:14px;height:2px;}
.logo-pill::after{width:2px;height:14px;}
.splash h1{
  font-size:2.4rem;font-weight:600;color:var(--brand-fg);
  letter-spacing:.01em;margin-bottom:4px;
}
.splash .sub{
  font-family:'Cormorant Garamond',serif;font-style:italic;
  color:var(--ink-soft);font-size:1.05rem;margin-bottom:22px;
}
.splash .verse-quote{
  font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:1.18rem;color:var(--brand-fg);
  padding:18px 16px;border-top:1px solid var(--parchment-2);border-bottom:1px solid var(--parchment-2);
  margin:18px 0 28px;
}
.splash .verse-quote .ref{
  display:block;font-style:normal;font-family:'Lato',sans-serif;
  font-size:.72rem;letter-spacing:.18em;text-transform:uppercase;
  color:var(--gold-dark);margin-top:8px;font-weight:700;
}
.action-stack{display:flex;flex-direction:column;gap:12px;margin-top:8px;}

/* ===== Module 2 — Diagnostic ===== */
.step-indicator{
  display:flex;gap:6px;justify-content:center;margin-bottom:18px;
}
.step-indicator span{
  width:32px;height:3px;border-radius:2px;background:var(--parchment-2);
}
.step-indicator span.active{background:var(--gold);}
.diag-question{
  font-family:'Cormorant Garamond',serif;font-size:1.55rem;font-weight:500;
  color:var(--brand-fg);text-align:center;margin:8px 0 4px;line-height:1.25;
}
.diag-hint{
  text-align:center;color:var(--ink-soft);font-style:italic;
  font-family:'Cormorant Garamond',serif;font-size:1.02rem;margin-bottom:22px;
}
.option-list{display:flex;flex-direction:column;gap:10px;margin-bottom:22px;}
.option{
  display:flex;align-items:center;gap:12px;
  padding:16px 18px;border-radius:var(--r-md);
  background:var(--cream-2);border:1.5px solid var(--parchment-2);
  cursor:pointer;text-align:left;
  transition:all .25s var(--tx);
  font-family:'Lato',sans-serif;color:var(--ink);font-size:.96rem;
}
.option:hover{border-color:var(--gold);background:var(--bg-card-2);}
.option.selected{
  border-color:var(--gold);
  background:linear-gradient(180deg,var(--honey-1),var(--honey-2));
  box-shadow:0 4px 14px rgba(196,154,42,.18);
}
.option .ico{
  width:34px;height:34px;flex-shrink:0;border-radius:50%;
  background:var(--parchment);display:flex;align-items:center;justify-content:center;
  color:var(--brand-fg);font-size:1.1rem;
}
.option.selected .ico{background:var(--gold);color:var(--cream);}

/* Reassurance */
.reassure-title{
  font-family:'Cormorant Garamond',serif;font-size:1.7rem;font-weight:600;
  color:var(--brand-fg);text-align:center;line-height:1.2;
}
.verse-list{margin-top:14px;display:flex;flex-direction:column;gap:10px;}
.verse-list li{
  list-style:none;padding:12px 14px;
  background:var(--cream-2);border-left:3px solid var(--gold);
  border-radius:0 var(--r-sm) var(--r-sm) 0;
  font-family:'Cormorant Garamond',serif;font-size:1.05rem;color:var(--brand-fg);
}
.verse-list li .ref-tag{
  font-family:'Lato',sans-serif;font-size:.68rem;letter-spacing:.15em;
  text-transform:uppercase;color:var(--gold-dark);font-weight:700;
  display:block;margin-bottom:2px;
}
.heb-quote{
  margin-top:18px;padding:18px;background:var(--parchment);border-radius:var(--r-md);
  font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1.1rem;
  color:var(--brand-fg);text-align:center;line-height:1.45;
}

/* ===== Module 3/4 — Pill card ===== */
.pill-meta{
  display:flex;align-items:center;justify-content:space-between;gap:10px;
  margin-bottom:14px;flex-wrap:wrap;
}
.pill-num{
  font-family:'Cormorant Garamond',serif;font-size:1rem;
  color:var(--ink-soft);letter-spacing:.04em;
}
.pill-num strong{color:var(--brand-fg);font-weight:600;}
.pill-time-icon{font-size:1.4rem;line-height:1;}
.pill-title{
  font-family:'Cormorant Garamond',serif;font-size:1.7rem;font-weight:600;
  color:var(--brand-fg);line-height:1.18;margin-top:4px;
}
.pill-subtitle{
  font-family:'Cormorant Garamond',serif;font-style:italic;
  color:var(--ink-soft);font-size:1.08rem;margin-top:2px;
}
.section-label{
  font-family:'Lato',sans-serif;font-size:.85rem;letter-spacing:.18em;
  text-transform:uppercase;color:var(--gold-dark);font-weight:700;
  margin-bottom:8px;display:flex;align-items:center;gap:8px;
}
.section-label::before{
  content:'';width:18px;height:1.5px;background:var(--gold);display:inline-block;
}
.verse-block{
  background:var(--bg-card-2);border:1px solid var(--parchment-2);
  border-radius:var(--r-md);padding:18px 18px 14px;margin-bottom:8px;
}
.verse-block + .verse-block{margin-top:10px;}
.verse-tag{
  font-family:'Lato',sans-serif;font-size:.85rem;letter-spacing:.15em;
  text-transform:uppercase;color:var(--gold-dark);font-weight:700;margin-bottom:6px;
}
.verse-text{
  font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1.4rem;
  color:var(--verse-gray);line-height:1.65;
}
.verse-ref{
  font-family:'Lato',sans-serif;font-size:.95rem;letter-spacing:.08em;
  color:var(--brand-fg);margin-top:10px;font-weight:700;
}
.legend-mini{
  font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:.92rem;color:var(--ink-soft);margin-top:10px;text-align:center;
}
.teaching{
  font-size:1.1rem;color:var(--ink);line-height:1.75;
  text-align:justify;
}
.teaching p + p{margin-top:10px;}
.teaching em{color:var(--brand-fg);font-weight:500;}
.confession{
  font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1.35rem;
  color:var(--brand-fg);line-height:1.55;text-align:center;
  padding:18px 16px;background:linear-gradient(180deg,var(--honey-1),var(--honey-2));
  border-radius:var(--r-md);border:1px solid var(--honey-border);
  margin-top:8px;
}

/* Version toggle tabs */
.verse-tabs{display:flex;gap:0;margin-bottom:0;border-bottom:2px solid var(--parchment-2);}
.verse-tab{
  flex:1;padding:12px 8px;text-align:center;cursor:pointer;
  font-family:'Lato',sans-serif;font-size:.88rem;letter-spacing:.1em;
  text-transform:uppercase;font-weight:700;color:var(--ink-soft);
  background:transparent;border:none;transition:all .2s;position:relative;
}
.verse-tab.active{color:var(--gold-dark);}
.verse-tab.active::after{
  content:'';position:absolute;bottom:-2px;left:0;right:0;height:2px;
  background:var(--gold);
}
.verse-panel{display:none;padding:20px 20px 16px;background:var(--bg-card-2);
  border:1px solid var(--parchment-2);border-top:none;border-radius:0 0 var(--r-md) var(--r-md);}
.verse-panel.active{display:block;}
.verse-wrapper{border-radius:var(--r-md);overflow:hidden;border:1px solid var(--parchment-2);
  border-bottom:none;margin-bottom:8px;}

/* Verse browser in memorization */
.browse-toggle{display:flex;gap:0;margin-bottom:18px;border-radius:var(--r-md);overflow:hidden;border:1.5px solid var(--parchment-2);}
.browse-toggle button{
  flex:1;padding:10px;border:none;cursor:pointer;font-family:'Lato',sans-serif;
  font-size:.82rem;letter-spacing:.1em;text-transform:uppercase;font-weight:700;
  background:var(--cream-2);color:var(--ink-soft);transition:all .2s;
}
.browse-toggle button.active{background:var(--navy);color:var(--gold-light);}
.verse-browser{max-height:65vh;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.verse-browser-item{
  padding:18px 16px;border-bottom:1px solid var(--parchment);
  cursor:pointer;transition:background .15s;
}
.verse-browser-item:hover,.verse-browser-item:active{background:rgba(196,154,42,.06);}
.verse-browser-item .vb-ref{
  font-family:'Lato',sans-serif;font-size:.82rem;letter-spacing:.1em;
  font-weight:700;color:var(--brand-fg);margin-bottom:4px;
}
.verse-browser-item .vb-theme{
  font-family:'Cormorant Garamond',serif;font-size:1rem;font-style:italic;
  color:var(--ink-soft);margin-bottom:8px;
}
.verse-browser-item .vb-text{
  font-family:'Cormorant Garamond',serif;font-size:1.25rem;font-style:italic;
  color:var(--verse-gray);line-height:1.6;
}
.verse-browser-item .vb-text .key{color:var(--key-color);font-weight:700;font-style:normal;}

/* Font scale control */
.font-scale-row{display:flex;align-items:center;gap:12px;}
.font-scale-row button{
  width:40px;height:40px;border-radius:50%;border:1.5px solid var(--parchment-2);
  background:var(--cream-2);color:var(--brand-fg);font-size:1.2rem;font-weight:700;
  cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;
}
.font-scale-row button:active{background:var(--parchment);}
.font-scale-row .scale-label{
  font-family:'Lato',sans-serif;font-size:.88rem;color:var(--brand-fg);font-weight:700;min-width:45px;text-align:center;
}

/* Pill nav */
.pill-nav{display:flex;gap:10px;margin-top:18px;}
.pill-nav .btn{flex:1;}
.progress-bar{
  height:6px;background:var(--parchment-2);border-radius:6px;overflow:hidden;
  margin:6px 0 14px;
}
.progress-bar > span{
  display:block;height:100%;background:linear-gradient(90deg,var(--gold-light),var(--gold-dark));
  border-radius:6px;transition:width .5s var(--tx);
}

/* Day indicator on home (in-progress) */
.day-indicator{
  background:var(--cream-2);
  border:1px solid var(--parchment-2);
  border-radius:var(--r-lg);
  padding:22px 20px;
  box-shadow:var(--shadow-sm);
  text-align:center;
  margin-bottom:14px;
}
.day-indicator .day-title{
  font-family:'Cormorant Garamond',serif;font-size:2.1rem;font-weight:600;
  color:var(--brand-fg);line-height:1.1;
  letter-spacing:.04em;
}
.day-indicator .day-title .day-total{
  color:var(--ink-soft);font-size:1.4rem;font-weight:500;
}
.day-indicator .day-pills{
  display:flex;justify-content:center;gap:8px;
  flex-wrap:wrap;margin-top:10px;
}
.day-indicator .progress-bar{margin:14px 0 6px;}
.day-indicator .day-caption{
  font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:.95rem;color:var(--ink-soft);margin-top:6px;
}

/* Intro blurb (home, before first diagnostic) */
.intro-blurb{
  font-family:'Cormorant Garamond',serif;
  font-size:.98rem;color:var(--ink-soft);
  text-align:left;line-height:1.6;
  padding:16px 18px;border-radius:var(--r-md);
  background:var(--cream-2);border:1px solid var(--parchment-2);
  margin-bottom:4px;
}
.intro-link{
  display:inline-flex;align-items:center;gap:6px;
  align-self:flex-start;
  background:transparent;border:none;cursor:pointer;
  font-family:'Lato',sans-serif;font-size:.85rem;font-weight:700;
  color:var(--gold-dark);letter-spacing:.06em;
  padding:6px 0;margin-bottom:6px;
}
.intro-link:hover{text-decoration:underline;}

/* Pill confirmation screen */
.pill-confirm{
  text-align:center;padding:36px 22px;
}
.pill-confirm .check{
  width:84px;height:84px;border-radius:50%;
  background:linear-gradient(180deg,var(--gold-light),var(--gold));
  color:#0D2340;font-size:2.6rem;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 18px;
  box-shadow:0 10px 28px rgba(196,154,42,.35);
  animation:checkPop .5s var(--tx) both;
}
@keyframes checkPop{
  0%{transform:scale(.4);opacity:0;}
  60%{transform:scale(1.08);opacity:1;}
  100%{transform:scale(1);}
}
.pill-confirm h2{
  font-family:'Cormorant Garamond',serif;font-size:1.9rem;font-weight:600;
  color:var(--brand-fg);
}
.pill-confirm .sub{
  font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:1.1rem;color:var(--ink-soft);margin-top:6px;
}

/* Update banner */
.update-banner{
  display:none;
  position:fixed;
  top:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:520px;
  background:var(--navy);
  color:var(--cream);
  padding:12px 20px;
  z-index:100;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  font-size:.88rem;
  font-weight:700;
  box-shadow:var(--shadow-md);
}
.update-banner.show{display:flex;}

/* ===== Module 5 — Memorization ===== */
.flashcard{
  perspective:1200px;height:340px;margin:18px 0;
  cursor:pointer;
}
.flashcard-inner{
  position:relative;width:100%;height:100%;
  transform-style:preserve-3d;transition:transform .65s var(--tx);
}
.flashcard.flipped .flashcard-inner{transform:rotateY(180deg);}
.flashcard-face{
  position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;
  border-radius:var(--r-lg);padding:26px;
  display:flex;flex-direction:column;justify-content:center;align-items:center;
  text-align:center;box-shadow:var(--shadow-md);
}
.flashcard-front{
  background:linear-gradient(180deg,var(--navy-soft),var(--navy));
  color:var(--cream);
}
.flashcard-front .ref-big{
  font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:600;
  color:var(--gold-light);margin-bottom:10px;
}
.flashcard-front .fc-context{
  display:flex;align-items:center;justify-content:center;gap:8px;
  font-family:'Lato',sans-serif;font-size:.78rem;letter-spacing:.16em;
  text-transform:uppercase;font-weight:700;
  color:rgba(247,243,236,.78);margin-bottom:14px;
}
.flashcard-front .fc-context .fc-dot{opacity:.6;}
.flashcard-front .fc-theme{
  font-family:'Cormorant Garamond',serif;font-style:italic;
  color:rgba(247,243,236,.85);font-size:1.02rem;margin-top:6px;
}
.flashcard-front .tap{
  font-family:'Cormorant Garamond',serif;font-style:italic;
  color:rgba(247,243,236,.65);font-size:.95rem;margin-top:18px;
}
.flashcard-back{
  background:var(--cream-2);transform:rotateY(180deg);
  border:1px solid var(--parchment-2);
}
.flashcard-back .verse{
  font-size:1.08rem;color:var(--ink-soft);line-height:1.5;
}
.flashcard-back .ref{
  font-family:'Lato',sans-serif;font-size:.72rem;letter-spacing:.18em;
  text-transform:uppercase;color:var(--gold-dark);margin-top:14px;font-weight:700;
}
.memo-actions{display:flex;gap:8px;}
.memo-actions .btn{flex:1;padding:12px 8px;font-size:.72rem;}
.memo-stats{
  display:flex;justify-content:space-around;text-align:center;margin-top:14px;
  padding:14px 8px;background:var(--cream-2);border-radius:var(--r-md);
  border:1px solid var(--parchment-2);
}
.memo-stats .stat .num{
  font-family:'Cormorant Garamond',serif;font-size:1.8rem;font-weight:600;color:var(--brand-fg);
}
.memo-stats .stat .lbl{
  font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-soft);
}

/* ===== Module 6 — Settings ===== */
.setting-row{
  display:flex;align-items:center;justify-content:space-between;gap:14px;
  padding:14px 0;border-bottom:1px solid var(--parchment-2);
}
.setting-row:last-child{border-bottom:none;}
.setting-row .label{font-weight:700;color:var(--brand-fg);font-size:.95rem;}
.setting-row .desc{font-size:.82rem;color:var(--ink-soft);font-family:'Cormorant Garamond',serif;font-style:italic;margin-top:2px;}
.time-input{
  font-family:'Lato',sans-serif;font-size:1rem;padding:8px 12px;
  border:1.5px solid var(--parchment-2);border-radius:var(--r-sm);
  background:var(--cream-2);color:var(--brand-fg);font-weight:700;
}
/* Toggle */
.toggle{
  position:relative;width:46px;height:26px;flex-shrink:0;
  background:var(--parchment-2);border-radius:99px;cursor:pointer;
  transition:background .25s var(--tx);
}
.toggle::after{
  content:'';position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;
  background:var(--cream);box-shadow:0 1px 3px rgba(0,0,0,.18);
  transition:left .25s var(--tx);
}
.toggle.on{background:var(--gold);}
.toggle.on::after{left:23px;}
.disclaimer{
  margin-top:18px;padding:12px 14px;background:var(--parchment);
  border-radius:var(--r-sm);font-size:.78rem;
  font-family:'Cormorant Garamond',serif;font-style:italic;
  color:var(--ink-soft);line-height:1.5;
}

/* Bottom nav */
.bottom-nav{
  position:fixed;left:50%;transform:translateX(-50%);bottom:0;
  width:100%;max-width:520px;
  background:var(--bg-card);backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
  border-top:1px solid var(--border-c);
  display:flex;justify-content:space-around;
  padding:10px 8px calc(10px + env(safe-area-inset-bottom));
  z-index:50;
}
.nav-btn{
  flex:1;background:none;border:none;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:6px 4px;color:var(--ink-soft);font-size:.66rem;
  letter-spacing:.06em;text-transform:uppercase;font-weight:700;
  font-family:'Lato',sans-serif;
}
.nav-btn .nav-ico{font-size:1.2rem;line-height:1;}
.nav-btn.active{color:var(--gold-dark);}
.nav-btn.active .nav-ico{transform:scale(1.1);}

/* Toast */
.toast{
  position:fixed;left:50%;bottom:96px;transform:translateX(-50%);
  background:var(--navy);color:var(--cream);
  padding:12px 18px;border-radius:99px;font-size:.85rem;
  box-shadow:var(--shadow-lg);z-index:100;
  opacity:0;transition:opacity .3s, transform .3s;pointer-events:none;
  font-weight:600;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(-8px);}

/* Modal */
.modal-backdrop{
  position:fixed;inset:0;background:rgba(0,0,0,.65);
  display:none;align-items:center;justify-content:center;z-index:200;
  padding:20px;backdrop-filter:blur(4px);
}
[data-theme="light"] .modal-backdrop{background:rgba(13,35,64,.55);}
.modal-backdrop.show{display:flex;animation:fadeIn .25s var(--tx);}
.modal{
  background:var(--cream-2);border-radius:var(--r-lg);
  padding:24px;max-width:380px;width:100%;
  box-shadow:var(--shadow-lg);
}
.modal h3{font-size:1.4rem;color:var(--brand-fg);font-weight:600;margin-bottom:8px;}
.modal p{color:var(--ink-soft);margin-bottom:18px;font-size:.95rem;}
.modal-actions{display:flex;gap:10px;}
.modal-actions .btn{flex:1;}

/* Responsive */
@media (min-width:600px){
  .verse-block-row{}
}
@media (max-width:380px){
  .splash h1{font-size:2rem;}
  .pill-title{font-size:1.45rem;}
}

/* Accessibility */
@media (prefers-reduced-motion:reduce){
  *{animation-duration:.01ms !important;transition-duration:.01ms !important;}
}
.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0);}

</style>
</head>
<body>
<div class="app">

  <!-- ============================================================
       MODULE 1 — HOME / SPLASH
       ============================================================ -->
  <main id="screen-home" class="screen active">
    <div class="splash stagger">
      <div class="logo-orb" aria-hidden="true">
        <div class="logo-pill"></div>
      </div>
      <h1>God's Medicine</h1>
      <p class="sub">Ordonnance divine de guérison</p>
      <blockquote class="verse-quote">
        « Mon peuple périt faute de connaissance »
        <span class="ref">Osée 4:6</span>
      </blockquote>
      <div class="action-stack" id="home-actions">
        <!-- buttons injected by JS based on progress -->
      </div>
    </div>
  </main>

  <!-- ============================================================
       MODULE 2 — DIAGNOSTIC
       ============================================================ -->
  <main id="screen-diagnostic" class="screen">
    <div class="topbar">
      <button class="back" data-nav="home" aria-label="Retour">‹</button>
      <span class="title">Diagnostic initial</span>
      <span class="spacer"></span>
    </div>
    <div class="step-indicator" id="diag-steps" aria-hidden="true">
      <span class="active"></span><span></span><span></span>
    </div>
    <div id="diag-content"></div>
  </main>

  <!-- ============================================================
       MODULE 3/4 — TREATMENT & CONVALESCENCE (single template)
       ============================================================ -->
  <main id="screen-pill" class="screen">
    <div class="topbar">
      <button class="back" data-nav="home" aria-label="Retour">‹</button>
      <span class="title" id="pill-phase-title">Traitement</span>
      <span class="spacer"></span>
      <button class="btn btn-ghost btn-sm" data-nav="memorization">Versets</button>
    </div>
    <div class="progress-bar"><span id="pill-progress" style="width:0%"></span></div>
    <div id="pill-content"></div>
  </main>

  <!-- ============================================================
       MODULE 5 — MEMORIZATION
       ============================================================ -->
  <main id="screen-memorization" class="screen">
    <div class="topbar">
      <button class="back" data-nav="home" aria-label="Retour">‹</button>
      <span class="title">Mémorisation</span>
      <span class="spacer"></span>
    </div>
    <div id="memo-content"></div>
  </main>

  <!-- ============================================================
       MODULE 6 — SETTINGS
       ============================================================ -->
  <main id="screen-settings" class="screen">
    <div class="topbar">
      <button class="back" data-nav="home" aria-label="Retour">‹</button>
      <span class="title">Paramètres</span>
      <span class="spacer"></span>
    </div>
    <div id="settings-content"></div>
  </main>

  <!-- ============================================================
       MODULE 7 — ABOUT
       ============================================================ -->
  <main id="screen-about" class="screen">
    <div class="topbar">
      <button class="back" data-nav="settings" aria-label="Retour">‹</button>
      <span class="title">À propos</span>
      <span class="spacer"></span>
    </div>
    <div id="about-content"></div>
  </main>

  <!-- Update banner -->
  <div class="update-banner" id="update-banner">
    <span>Une mise à jour est disponible</span>
    <button class="btn btn-gold btn-sm" id="update-btn">Mettre à jour</button>
  </div>

  <!-- Bottom nav -->
  <nav class="bottom-nav" id="bottom-nav">
    <button class="nav-btn active" data-nav="home"><span class="nav-ico">⌂</span><span>Accueil</span></button>
    <button class="nav-btn" data-nav="pill"><span class="nav-ico">◉</span><span>Comprimé</span></button>
    <button class="nav-btn" data-nav="memorization"><span class="nav-ico">✦</span><span>Versets</span></button>
    <button class="nav-btn" data-nav="settings"><span class="nav-ico">⚙</span><span>Paramètres</span></button>
  </nav>

</div>

<div class="toast" id="toast"></div>

  <div class="modal">
    <h3 id="modal-title"></h3>
    <p id="modal-body"></p>
    <div class="modal-actions">

      <button class="btn btn-primary" id="modal-confirm">Confirmer</button>
