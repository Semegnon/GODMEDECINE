<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="God's Medicine">
  <defs>
    <radialGradient id="bg" cx="40%" cy="35%" r="75%">
      <stop offset="0%" stop-color="#1B3866"/>
      <stop offset="65%" stop-color="#0D2340"/>
      <stop offset="100%" stop-color="#081730"/>
    </radialGradient>
    <linearGradient id="pill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8C96A"/>
      <stop offset="55%" stop-color="#C49A2A"/>
      <stop offset="100%" stop-color="#A6831F"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- background disc -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>

  <!-- inner gold ring -->
  <circle cx="256" cy="256" r="232" fill="none" stroke="#C49A2A" stroke-width="3" stroke-opacity="0.55"/>
  <circle cx="256" cy="256" r="216" fill="none" stroke="#E8C96A" stroke-width="1" stroke-opacity="0.35" stroke-dasharray="3 5"/>

  <!-- subtle inner glow under pill -->
  <ellipse cx="256" cy="280" rx="170" ry="60" fill="#C49A2A" fill-opacity="0.18" filter="url(#soft)"/>

  <!-- gold pill capsule -->
  <g transform="translate(256 256)">
    <rect x="-150" y="-60" width="300" height="120" rx="60" ry="60" fill="url(#pill)"/>
    <rect x="-150" y="-60" width="300" height="120" rx="60" ry="60" fill="none" stroke="#7C5E16" stroke-width="3" stroke-opacity="0.35"/>
    <!-- highlight -->
    <rect x="-130" y="-50" width="260" height="22" rx="12" fill="#FFF6DA" fill-opacity="0.45"/>
    <!-- white cross inside the pill -->
    <g fill="#F7F3EC">
      <rect x="-10" y="-38" width="20" height="76" rx="3"/>
      <rect x="-38" y="-10" width="76" height="20" rx="3"/>
    </g>
    <!-- inner shadow under cross -->
    <g fill="#7C5E16" fill-opacity="0.25">
      <rect x="-10" y="34" width="20" height="4" rx="2"/>
      <rect x="34" y="-10" width="4" height="20" rx="2"/>
    </g>
  </g>

  <!-- outer fine gold rim -->
  <circle cx="256" cy="256" r="254" fill="none" stroke="#C49A2A" stroke-width="2" stroke-opacity="0.6"/>
</svg>
